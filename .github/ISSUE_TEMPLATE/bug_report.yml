name: Bug report
description: Report incorrect or broken DevDoctor behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private source code, or proprietary logs. Report security issues privately according to SECURITY.md.
  - type: input
    id: version
    attributes:
      label: DevDoctor version or commit
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux, Other]
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include minimal reproduction steps using a public or synthetic project.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
